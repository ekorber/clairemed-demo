# Port 80: serve the ACME HTTP-01 challenge for cert renewal, redirect everything else to HTTPS.
server {
    listen 80;
    server_name alicedemo.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# Port 443: the app over TLS.
server {
    listen 443 ssl;
    server_name alicedemo.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/alicedemo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alicedemo.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 5m;

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # required for SSE streaming
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;   # SPA routing
    }
}
